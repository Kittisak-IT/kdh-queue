<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะคิวห้องพิเศษ - รพ.กาญจนดิษฐ์</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #f0fdfa;
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 450px;
            height: 85vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 25px 20px 10px;
            text-align: center;
            background: white;
            z-index: 10;
            border-bottom: 1px solid #f1f5f9;
        }

        .header h2 { margin: 0; color: #1e293b; font-size: 1.4rem; font-weight: 600; }
        .header p { margin: 5px 0 0; color: #64748b; font-size: 0.85rem; }

        /* ปรับปรุงส่วนนี้เพื่อไม่ให้ทับหัวตาราง */
        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
            background: #fff;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            /* ปรับค่า top ให้ลดลงเพื่อไม่ให้บังหัวตาราง (จาก -55px เป็น -45px) */
            top: -45px; 
            left: 0;
            width: 100%;
            /* เพิ่มความสูงชดเชยส่วนที่ดันขึ้นไป */
            height: calc(100% + 45px); 
            border: none;
        }

        .loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0d9488;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer {
            padding: 12px;
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            background: #fff;
            border-top: 1px solid #f1f5f9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 2.2rem; color: #0d9488; margin-bottom: 8px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
                <path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h13zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"/>
                <path d="M7 5.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm-2 0a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm2 3a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm-2 0a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm2 3a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm-2 0a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0z"/>
            </svg>
        </div>
        <h2>ลำดับคิวห้องพิเศษ</h2>
        <p>โรงพยาบาลกาญจนดิษฐ์ (v3.8)</p>
    </div>

    <div class="iframe-wrapper">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #94a3b8; font-size: 0.9rem;">กำลังโหลดข้อมูล...</p>
        </div>
        
        <iframe 
            src="https://script.google.com/macros/s/AKfycbyzRfRaWh9tE3tXOviiRbyY-_VqhkUlckS9abxMPR8B86hmhEJVM02vGPyUPEhptnEUJA/exec?mode=guest" 
            onload="hideLoader()">
        </iframe>
    </div>

    <div class="footer">
        ระบบบริหารจัดการโดยแผนกไอที รพ.กาญจนดิษฐ์
    </div>
</div>

<script>
    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.display = 'none';
        }, 500);
    }
</script>

</body>
</html>
