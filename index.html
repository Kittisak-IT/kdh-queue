<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คคิวห้องพิเศษ - รพ.กาญจนดิษฐ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0fdfa; /* สีพื้นหลังโทนเขียวอ่อนดูสบายตา */
            margin: 0;
            display: flex;
            align-items: center; /* จัดกึ่งกลางแนวตั้ง */
            justify-content: center; /* จัดกึ่งกลางแนวนอน */
            min-height: 100vh; /* ให้ความสูงเต็มจอ */
            padding: 20px; /* เพิ่มช่องว่างรอบๆ สำหรับจอเล็ก */
        }

        .guest-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px; /* กำหนดความกว้างสูงสุด */
            padding: 40px; /* ช่องว่างภายใน Card */
            border-radius: 25px; /* ขอบโค้งมน */
            box-shadow: 0 10px 25px rgba(13, 148, 136, 0.1); /* เงาบางๆ เพิ่มมิติ */
            border: none;
        }

        .header-icon {
            font-size: 3rem;
            color: #0d9488; /* สีเขียวหลัก */
            margin-bottom: 20px;
        }

        .main-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .sub-title {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .status-alert {
            background-color: #ccfbf1; /* สีพื้นหลัง Alert */
            color: #0f766e; /* สีตัวอักษร Alert */
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            border: none;
            display: flex;
            align-items: center;
            font-weight: 400;
        }

        .patient-info-box {
            text-align: left;
            margin-bottom: 30px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 300;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
        }

        .room-number-lg {
            font-size: 2.5rem;
            font-weight: 600;
            color: #0d9488;
            margin-bottom: 5px;
        }

        .footer-text {
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
            margin-top: auto;
        }

        /* สำหรับหน้าจอเล็ก ปรับลด Padding */
        @media (max-width: 576px) {
            .guest-card {
                padding: 30px 20px;
            }
            .main-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="guest-card text-center d-flex flex-column">
        <div class="header-icon">
            <i class="bi bi-door-open-fill"></i>
        </div>

        <h2 class="main-title">สถานะห้องพักพิเศษ</h2>
        <p class="sub-title">โรงพยาบาลกาญจนดิษฐ์</p>

        <div class="status-alert" role="alert">
            <i class="bi bi-info-circle-fill fs-5 me-3"></i>
            <div>
                ข้อมูลอัปเดตแบบ Real-time ตามระบบสถานะห้องพักปัจจุบัน
            </div>
        </div>

        <div class="patient-info-box">
            <div class="row mb-3">
                <div class="col-6">
                    <div class="info-label">ชื่อผู้ป่วย</div>
                    <div class="info-value">นายสมชาย เข็มกลัด</div>
                </div>
                <div class="col-6 text-end">
                    <div class="info-label">ลำดับคิว</div>
                    <div class="info-value">1</div>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <div class="info-label">ได้จัดสรรห้องพักหมายเลข</div>
                <div class="room-number-lg">917</div>
                <div class="badge bg-success rounded-pill px-3 py-2">เข้าพักแล้ว</div>
            </div>
        </div>

        <div class="footer-text">
            <i class="bi bi-shield-check-fill me-1"></i> ระบบบริหารจัดการโดยแผนกไอที โรงพยาบาลกาญจนดิษฐ์
        </div>
    </div>

</body>
</html>
