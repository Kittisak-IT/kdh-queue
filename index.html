<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คคิวห้องพิเศษ - รพ.กาญจนดิษฐ์</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Sarabun', sans-serif; }
        /* ซ่อนแถบ Google โดยการขยับ Iframe ขึ้นไปด้านบนนิดหน่อย */
        iframe {
            width: 100%;
            height: calc(100% + 50px);
            border: none;
            margin-top: -50px; 
        }
        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-screen">
    <div style="text-align: center;">
        <img src="https://cdn-icons-png.flaticon.com/512/3063/3063205.png" width="80">
        <p style="margin-top: 15px; color: #0d9488;">กำลังโหลดข้อมูลคิว...</p>
    </div>
</div>

<iframe 
    src="https://script.google.com/macros/s/AKfycbyzRfRaWh9tE3tXOviiRbyY-_VqhkUlckS9abxMPR8B86hmhEJVM02vGPyUPEhptnEUJA/exec?mode=guest" 
    onload="document.getElementById('loader').style.opacity='0'; setTimeout(()=>document.getElementById('loader').remove(), 500);">
</iframe>

</body>
</html>
