<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คคิวห้องพิเศษ - โรงพยาบาลกาญจนดิษฐ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: #f0f7f7;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-card {
            max-width: 400px;
            width: 85%;
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            text-align: center;
        }
        .icon-header {
            font-size: 3rem;
            color: #0d9488;
            margin-bottom: 15px;
        }
        /* ปรับปรุงปุ่มให้แสดงผลแน่นอน */
        .btn-link {
            display: block !important;
            width: 100% !important;
            background-color: #0d9488 !important;
            color: #ffffff !important;
            padding: 18px 10px !important;
            border-radius: 15px !important;
            text-decoration: none !important;
            font-weight: 600 !important;
            font-size: 1.2rem !important;
            margin-top: 20px !important;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2) !important;
        }
        .alert-mini {
            background: #e6fffa;
            color: #0d9488;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="icon-header">
        <i class="bi bi-person-vcard-fill"></i>
    </div>
    
    <h4 class="fw-bold mb-1">ระบบเช็คคิวห้องพิเศษ</h4>
    <p class="text-muted small">โรงพยาบาลกาญจนดิษฐ์</p>
    
    <div class="alert-mini">
        <i class="bi bi-info-circle-fill me-1"></i> ข้อมูลอัปเดตแบบ Real-time
    </div>

    <a href="https://script.google.com/macros/s/AKfycbyzRfRaWh9tE3tXOviiRbyY-_VqhkUlckS9abxMPR8B86hmhEJVM02vGPyUPEhptnEUJA/exec?mode=guest" 
       class="btn-link">
        <i class="bi bi-search me-2"></i> ตรวจสอบคิวปัจจุบัน
    </a>

    <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 25px;">
        <i class="bi bi-shield-lock-fill"></i> ระบบโดยแผนกไอที
    </p>
</div>

</body>
</html>
