<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะคิวห้องพิเศษ - รพ.กาญจนดิษฐ์</title>
    <style>
        /* ตั้งค่าพื้นหลังและ Font */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #f0fdfa; /* สีพื้นหลังเขียวอ่อนสบายตา */
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* กล่อง Card หลัก */
        .container {
            width: 90%;
            max-width: 450px;
            height: 80vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ส่วนหัวของ Card */
        .header {
            padding: 25px 20px 15px;
            text-align: center;
            background: white;
            z-index: 10;
        }

        .header img { width: 60px; margin-bottom: 10px; }
        .header h2 { margin: 0; color: #1e293b; font-size: 1.4rem; }
        .header p { margin: 5px 0 0; color: #64748b; font-size: 0.9rem; }

        /* กรอบแสดงข้อมูล (Iframe) */
        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        /* เทคนิคซ่อนแถบแจ้งเตือนของ Google */
        iframe {
            position: absolute;
            top: -55px; /* ดันแถบ This application was created... ขึ้นไปซ่อน */
            left: 0;
            width: 100%;
            height: calc(100% + 55px);
            border: none;
        }

        /* หน้าจอรอโหลด */
        .loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.6s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0d9488;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ส่วนท้าย */
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            background: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 2.5rem; color: #0d9488; margin-bottom: 5px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" fill="currentColor" viewBox="0 0 16 16">
                <path d="M12 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zM4.5 3h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1zm0 2.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1zM4.5 8h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1zM4.5 10.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1 0-1z"/>
            </svg>
        </div>
        <h2>ลำดับคิวห้องพิเศษ</h2>
        <p>โรงพยาบาลกาญจนดิษฐ์ (v3.8)</p>
    </div>

    <div class="iframe-wrapper">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #94a3b8;">กำลังดึงข้อมูลคิว...</p>
        </div>
        
        <iframe 
            src="https://script.google.com/macros/s/AKfycbyzRfRaWh9tE3tXOviiRbyY-_VqhkUlckS9abxMPR8B86hmhEJVM02vGPyUPEhptnEUJA/exec?mode=guest" 
            onload="hideLoader()">
        </iframe>
    </div>

    <div class="footer">
        <small>ระบบบริหารจัดการโดยแผนกไอที</small>
    </div>
</div>

<script>
    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.display = 'none';
        }, 600);
    }
</script>

</body>
</html>
