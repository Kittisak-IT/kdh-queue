<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลำดับคิวห้องพิเศษ - โรงพยาบาลกาญจนดิษฐ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc; /* สีเทาฟ้าอ่อนๆ ดูสบายตา */
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 15px; /* เพิ่ม Padding รอบๆ เพื่อระยะห่าง */
        }

        .main-card-container {
            width: 100%;
            max-width: 450px; /* กำหนดความกว้างสูงสุดของ Card */
        }

        .guest-card {
            background-color: #ffffff;
            border-radius: 20px; /* ขอบโค้งมน */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* เงาบางๆ เพิ่มมิติ */
            padding: 35px; /* เพิ่ม Padding ภายใน Card */
            text-align: center;
            border: none;
            margin-bottom: 20px;
        }

        .header-section {
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
            margin-bottom: 30px; /* เพิ่มระยะห่างด้านล่างส่วนหัว */
        }

        .header-icon {
            font-size: 2.8rem; /* ขยายไอคอนเล็กน้อย */
            color: #0d9488; /* สีเขียวหลักของโรงพยาบาล */
            margin-bottom: 12px;
        }

        .main-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 5px;
            font-size: 1.6rem; /* ขยายขนาดหัวข้อ */
        }

        .sub-title {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        /* กล่องแจ้งข้อมูล Real-time ปรับระยะห่าง */
        .status-update-info {
            background-color: #f0fdfa; /* สีพื้นหลังโทนเขียวอ่อนดูสบายตา */
            color: #0f766e;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 30px; /* เพิ่มระยะห่างด้านล่าง */
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        /* ส่วนแสดงรายชื่อแบบรายการ (List) */
        .queue-list-group {
            text-align: left;
            margin-top: 10px;
        }

        .patient-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5px; /* เพิ่มความสูงของแต่ละบรรทัด */
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s;
        }

        .patient-row:last-child {
            border-bottom: none;
        }

        .patient-row:hover {
            background-color: #f8fafc;
        }

        /* ตกแต่งกล่องเลขคิว */
        .q-number-box {
            width: 45px;
            height: 45px;
            background: #0d9488;
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.25rem;
            margin-right: 18px; /* เพิ่มระยะห่างขวา */
        }

        .patient-details {
            flex-grow: 1;
        }

        .patient-name {
            font-size: 1.15rem; /* ขยายขนาดชื่อผู้ป่วย */
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 3px;
        }

        .patient-department {
            font-size: 0.88rem;
            color: #64748b;
        }

        /* ตกแต่งสถานะแยกสี ปรับขนาด Badge */
        .status-badge {
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 10px;
            font-weight: 600;
        }

        .bg-waiting {
            background-color: #fef3c7; /* สีเหลืองทองอ่อนๆ */
            color: #92400e;
        }

        .footer-text {
            font-size: 0.82rem;
            color: #94a3b8;
            margin-top: 15px;
        }

        /* สำหรับหน้าจอเล็ก ปรับลดขนาดองค์ประกอบเล็กน้อย */
        @media (max-width: 576px) {
            .guest-card {
                padding: 30px 20px;
            }
            .q-number-box {
                width: 42px;
                height: 42px;
                font-size: 1.15rem;
                margin-right: 12px;
            }
            .patient-name {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-card-container">
        <div class="guest-card">
            <div class="header-section">
                <div class="header-icon">
                    <i class="bi bi-door-open-fill"></i>
                </div>
                <h2 class="main-title">สถานะคิวห้องพักพิเศษ</h2>
                <p class="sub-title">โรงพยาบาลกาญจนดิษฐ์ (v3.8)</p>
            </div>

            <div class="status-update-info alert alert-teal">
                <i class="bi bi-clock-history fs-5"></i>
                <span>ข้อมูลอัปเดตแบบ Real-time ตามระบบสถานะปัจจุบัน</span>
            </div>

            <div id="queueDisplayArea" class="queue-list-group">
                <div class="text-center py-5">
                    <div class="spinner-border text-teal mb-3" role="status"></div>
                    <div class="text-muted">กำลังโหลดข้อมูลคิว...</div>
                </div>
            </div>

        </div>

        <div class="footer-text text-center">
            <i class="bi bi-shield-fill-check me-1"></i> ระบบบริหารจัดการโดยแผนกไอที โรงพยาบาลกาญจนดิษฐ์
        </div>
    </div>

    <script>
        function loadQueue() {
            // เรียกฟังก์ชันฝั่ง Apps Script (KDHOS)
            google.script.run.withSuccessHandler(data => {
                const container = document.getElementById('queueDisplayArea');
                let html = '';

                // กรองเฉพาะสถานะ "รอยืนยัน" และ "รอห้องว่าง" มาแสดง
                const filteredData = data.filter(r => ['รอยืนยัน', 'รอห้องว่าง'].includes(r[7]));

                if (filteredData.length === 0) {
                    container.innerHTML = '<div class="text-center py-5 text-muted small">ไม่พบข้อมูลคิวรอในขณะนี้</div>';
                    return;
                }

                filteredData.forEach((r, index) => {
                    const name = r[2]; // ชื่อผู้ป่วย
                    const dept = r[12]; // ตึกที่ส่ง
                    const status = r[7]; // สถานะ

                    html += `
                        <div class="patient-row">
                            <div class="q-number-box">${index + 1}</div>
                            <div class="patient-details">
                                <div class="patient-name">${name}</div>
                                <div class="patient-department">ตึก/หน่วยงาน: ${dept || '-'}</div>
                            </div>
                            <div class="text-end">
                                <span class="badge status-badge bg-waiting">${status}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }).getBookingData(); // เรียกฟังก์ชันใน Code.gs
        }

        // โหลดข้อมูลทันทีที่เปิดหน้า
        window.onload = loadQueue;
    </script>

</body>
</html>
