<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คคิวห้องพิเศษ - โรงพยาบาลกาญจนดิษฐ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-card {
            max-width: 450px;
            width: 90%;
            padding: 40px 30px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 15px 35px rgba(13, 148, 136, 0.15);
            background: white;
            text-align: center;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #0d9488;
            color: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
        }
        .btn-check {
            background: #0d9488;
            color: white;
            border-radius: 15px;
            padding: 15px 25px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            border: none;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-check:hover {
            background: #097a70;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 148, 136, 0.3);
            color: white;
        }
        .hospital-name { color: #0d9488; font-weight: 600; }
        .footer-text { font-size: 0.8rem; color: #94a3b8; margin-top: 25px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="icon-box">
        <i class="bi bi-person-badge-fill"></i>
    </div>
    <h3 class="fw-bold mb-1">ระบบเช็คคิวห้องพิเศษ</h3>
    <p class="text-muted mb-4">บริการตรวจสอบลำดับการจองคิวออนไลน์</p>
    
    <div class="alert alert-info py-2 mb-4" style="border-radius: 12px; font-size: 0.9rem;">
        <i class="bi bi-info-circle-fill me-2"></i> ข้อมูลอัปเดตแบบ Real-time
    </div>

    <div class="d-grid gap-2">
    <a href="https://script.google.com/macros/s/AKfycbyzRfRaWh9tE3tXOviiRbyY-_VqhkUlckS9abxMPR8B86hmhEJVM02vGPyUPEhptnEUJA/exec?mode=guest" 
       class="btn-check text-center" 
       style="background: #0d9488 !important; color: white !important; display: block !important; visibility: visible !important;">
        <i class="bi bi-search me-2"></i> ตรวจสอบคิวปัจจุบัน
    </a>
</div>

    <div class="mt-4">
        <p class="mb-0 small">โรงพยาบาล<span class="hospital-name">กาญจนดิษฐ์</span></p>
    </div>

    <div class="footer-text">
        <i class="bi bi-shield-check"></i> ระบบบริหารจัดการโดยแผนกไอที
    </div>
</div>

</body>
</html>
